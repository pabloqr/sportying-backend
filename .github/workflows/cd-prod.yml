name: CD Production

on:
  push:
    tags: [ "v*.*.*" ]

concurrency:
  group: production
  cancel-in-progress: false

env:
  NODE_VERSION: 24.13.1
  CI_POSTGRES_HOST: localhost
  CI_POSTGRES_PORT: 5432
  CI_POSTGRES_DB: tests
  CI_POSTGRES_USER: postgres
  CI_POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tests?schema=public
  CI_JWT_SECRET: ci-access-token-secret
  CI_JWT_REFRESH_SECRET: ci-refresh-token-secret

jobs:
  #---------------------------------------------------------------------------------------------------------------------
  # TESTS - Suite completo antes de desplegar en producción
  #---------------------------------------------------------------------------------------------------------------------
  validate:
    name: Typecheck, unit, integration and e2e tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.CI_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ env.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:int

      - name: Run end-to-end tests
        run: npm run test:e2e

  #---------------------------------------------------------------------------------------------------------------------
  # DEPLOY - Ejecutar al crear un tag de versión
  #---------------------------------------------------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: validate
    runs-on:
      - self-hosted
      - sportying-dev

    steps:
      - name: Show Docker version
        run: docker --version

      - name: Show Docker Compose version
        run: docker compose version

      - name: Update repository on server
        run: |
          cd /srv/apps/sportying_backend
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=no"
          git fetch origin
          git checkout main
          git pull origin main

      - name: Build image
        run: docker compose -f /srv/docker/compose/sportying/docker-compose.yml --profile prod build

      - name: Run database migrations
        run: |
          docker compose -f /srv/docker/compose/sportying/docker-compose.yml \
            --profile prod run --rm api \
            npx prisma migrate deploy

      - name: Deploy production stack
        run: docker compose -f /srv/docker/compose/sportying/docker-compose.yml --profile prod up -d

  #---------------------------------------------------------------------------------------------------------------------
  # SMOKE TESTS - Ejecutar solo si el deploy ha finalizado correctamente
  #---------------------------------------------------------------------------------------------------------------------
  smoke-tests:
    name: Smoke tests
    runs-on:
      - self-hosted
      - sportying-dev
    needs: deploy

    steps:
      - name: Wait for API to be ready
        run: |
          MAX_ATTEMPTS=15
          ATTEMPT=0
          until curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/auth/signin \
            -H "Content-Type: application/json" \
            -d '{"mail":"smoke@test.com","password":"invalid"}' \
            | grep -qE "^(400|401|404)"; do
            ATTEMPT=$((ATTEMPT+1))
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "API did not become ready after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting for API... ($ATTEMPT/$MAX_ATTEMPTS)"
            sleep 2
          done
          echo "API is ready"
