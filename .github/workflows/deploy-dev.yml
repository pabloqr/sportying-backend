name: Deploy Dev Backend

on:
  workflow_run:
    workflows:
      - CI Backend
    types:
      - completed
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy dev with Docker Compose
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev')
    runs-on:
      - self-hosted
      - sportying-dev

    steps:
      - name: Show Docker version
        run: docker --version

      - name: Show Docker Compose version
        run: docker compose version

      - name: Deploy development stack
        run: docker compose -f /srv/docker/compose/sportying/docker-compose.dev.yml up -d --build
