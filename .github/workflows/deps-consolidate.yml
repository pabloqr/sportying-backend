name: Consolidate Dependabot Updates

on:
  schedule:
    - cron: "0 9 * * 2" # Martes a las 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  consolidate:
    name: Consolidate passing Dependabot PRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch passing Dependabot PRs and consolidate
        id: consolidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          BRANCH="chore/deps-update-$(date +%Y-%m-%d)"
          MERGED_PRS=""
          SKIPPED_PRS=""

          # Obtener todas las PRs abiertas de Dependabot contra dev
          PRS=$(gh pr list \
            --repo "$REPO" \
            --author "app/dependabot" \
            --base dev \
            --state open \
            --json number,title,headRefName,statusCheckRollup \
            --limit 50)

          TOTAL=$(echo "$PRS" | jq 'length')

          if [ "$TOTAL" -eq 0 ]; then
            echo "no_prs=true" >> "$GITHUB_OUTPUT"
            echo "No hay PRs de Dependabot abiertas contra dev. Nada que consolidar."
            exit 0
          fi

          echo "no_prs=false" >> "$GITHUB_OUTPUT"

          # Crear rama de consolidación desde dev
          git checkout -b "$BRANCH"

          # Iterar sobre cada PR y mergear las que han pasado todos los checks
          for row in $(echo "$PRS" | jq -r '.[] | @base64'); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }

            NUMBER=$(_jq '.number')
            TITLE=$(_jq '.title')
            HEAD=$(_jq '.headRefName')
            CHECKS=$(_jq '.statusCheckRollup')

            # Comprobar que todos los checks han concluido con éxito
            TOTAL_CHECKS=$(echo "$CHECKS" | jq 'length')
            PASSING_CHECKS=$(echo "$CHECKS" | jq '[.[] | select(.conclusion == "SUCCESS" or .conclusion == "success")] | length')

            if [ "$TOTAL_CHECKS" -eq 0 ] || [ "$TOTAL_CHECKS" -ne "$PASSING_CHECKS" ]; then
              echo "PR #$NUMBER ($TITLE) - omitida (checks no superados o pendientes)"
              SKIPPED_PRS="$SKIPPED_PRS\n- #$NUMBER: $TITLE"
              continue
            fi

            # Hacer fetch de la rama de la PR y mergearla
            git fetch origin "$HEAD"

            if git merge --no-ff "origin/$HEAD" --no-edit -m "chore(deps): merge dependabot PR #$NUMBER - $TITLE"; then
              echo "PR #$NUMBER ($TITLE) - mergeada correctamente"
              MERGED_PRS="$MERGED_PRS\n- #$NUMBER: $TITLE"
            else
              echo "PR #$NUMBER ($TITLE) - conflicto al mergear, omitida"
              git merge --abort
              SKIPPED_PRS="$SKIPPED_PRS\n- #$NUMBER: $TITLE (conflicto)"
            fi
          done

          # Comprobar si se ha mergeado algo
          if [ -z "$MERGED_PRS" ]; then
            echo "merged_something=false" >> "$GITHUB_OUTPUT"
            echo "Ninguna PR ha podido consolidarse."
            exit 0
          fi

          echo "merged_something=true" >> "$GITHUB_OUTPUT"

          # Push de la rama de consolidación
          git push origin "$BRANCH"

          # Construir el cuerpo de la PR
          BODY="## Actualizaciones de dependencias consolidadas\n\n"
          BODY="${BODY}Este PR agrupa las actualizaciones de Dependabot que han superado todos los checks de CI.\n\n"
          BODY="${BODY}### Incluidas\n${MERGED_PRS}\n\n"

          if [ -n "$SKIPPED_PRS" ]; then
            BODY="${BODY}### Omitidas (requieren revisión manual)\n${SKIPPED_PRS}\n"
          fi

          # Abrir PR de consolidación contra dev
          gh pr create \
            --repo "$REPO" \
            --base dev \
            --head "$BRANCH" \
            --title "chore(deps): consolidate dependency updates $(date +%Y-%m-%d)" \
            --body "$(printf "$BODY")"

      - name: Summary
        if: steps.consolidate.outputs.no_prs == 'true'
        run: echo "### No había PRs de Dependabot abiertas esta semana." >>
          "$GITHUB_STEP_SUMMARY"
