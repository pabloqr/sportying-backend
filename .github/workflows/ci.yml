name: Run Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  NODE_VERSION: 24.13.1
  CI_POSTGRES_HOST: localhost
  CI_POSTGRES_PORT: 5432
  CI_POSTGRES_DB: tests
  CI_POSTGRES_USER: postgres
  CI_POSTGRES_PASSWORD: postgres

jobs:
  quality:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=postgresql://${{ env.CI_POSTGRES_USER }}:${{ env.CI_POSTGRES_PASSWORD }}@${{ env.CI_POSTGRES_HOST }}:${{ env.CI_POSTGRES_PORT }}/${{ env.CI_POSTGRES_DB }}?schema=public
          JWT_SECRET=${{ secrets.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.CI_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=postgresql://${{ env.CI_POSTGRES_USER }}:${{ env.CI_POSTGRES_PASSWORD }}@${{ env.CI_POSTGRES_HOST }}:${{ env.CI_POSTGRES_PORT }}/${{ env.CI_POSTGRES_DB }}?schema=public
          JWT_SECRET=${{ secrets.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run integration tests
        run: npm run test:int

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: integration

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.CI_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=postgresql://${{ env.CI_POSTGRES_USER }}:${{ env.CI_POSTGRES_PASSWORD }}@${{ env.CI_POSTGRES_HOST }}:${{ env.CI_POSTGRES_PORT }}/${{ env.CI_POSTGRES_DB }}?schema=public
          JWT_SECRET=${{ secrets.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run end-to-end tests
        run: npm run test:e2e
