name: Build and Deploy Development

on:
  workflow_dispatch:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  NODE_VERSION: 24.13.1
  CI_POSTGRES_HOST: localhost
  CI_POSTGRES_PORT: 5432
  CI_POSTGRES_DB: tests
  CI_POSTGRES_USER: postgres
  CI_POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tests?schema=public
  CI_JWT_SECRET: ci-access-token-secret
  CI_JWT_REFRESH_SECRET: ci-refresh-token-secret

jobs:
  #---------------------------------------------------------------------------------------------------------------------
  # SECURITY - Ejecutar en paralelo
  #---------------------------------------------------------------------------------------------------------------------
  snyk:
    name: Snyk Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --sarif-file-output=snyk-oss.sarif --all-projects

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

      # - name: Build Docker image for scanning
      #   run: docker build -t sportying-backend:ci .

      # - name: Run Snyk container scan
      #   uses: snyk/actions/docker@master
      #   continue-on-error: true
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   with:
      #     image: sportying-backend:ci
      #     args: --file=Dockerfile --sarif-file-output=snyk-container.sarif

      # - name: Upload container scan result to GitHub Code Scanning
      #   uses: github/codeql-action/upload-sarif@v4
      #   with:
      #     sarif_file: snyk-container.sarif
      #     category: snyk-container

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-typescript

  #---------------------------------------------------------------------------------------------------------------------
  # TESTS - Ejecutar en paralelo
  #---------------------------------------------------------------------------------------------------------------------
  quality:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ env.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit
          path: coverage/

  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.CI_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ env.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run integration tests
        run: npm run test:int

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.CI_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        shell: bash
        run: |
          cat <<EOF > .env.test.local
          DATABASE_URL=${{ env.DATABASE_URL }}
          JWT_SECRET=${{ env.CI_JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ env.CI_JWT_REFRESH_SECRET }}
          EOF

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run end-to-end tests
        run: npm run test:e2e

  #---------------------------------------------------------------------------------------------------------------------
  # DEPLOY - Ejecutar solo si todos los tests pasan
  #---------------------------------------------------------------------------------------------------------------------
  deploy:
    name: Deploy to development
    runs-on:
      - self-hosted
      - sportying-dev
    needs: [snyk, codeql, quality, integration, e2e]

    steps:
      - name: Show Docker version
        run: docker --version

      - name: Show Docker Compose version
        run: docker compose version

      - name: Update repository on server
        run: |
          cd /srv/apps/sportying_backend
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=no"
          git fetch origin
          git checkout dev
          git pull origin dev

      - name: Deploy development stack
        run: docker compose -f /srv/docker/compose/sportying/docker-compose.yml --profile dev up -d --build
