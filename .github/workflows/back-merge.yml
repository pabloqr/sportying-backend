name: Back-merge main -> dev

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to reference in the PR (e.g. v1.2.3)"
        required: false
        default: "manual"

# Permisos mínimos necesarios:
# - contents: read --> checkout y operaciones de lectura sobre el repositorio
# - pull-requests: write --> lectura/creación del PR de back-merge
permissions:
  contents: read
  pull-requests: write

jobs:
  back-merge:
    name: Create back-merge PR
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release reference
        id: release_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing back-merge PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "main" \
            --base "dev" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create back-merge PR
        if: steps.check_pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.PULL_REQUESTS_TOKEN }}
        run: |
          REVIEWER_OPT=""
          if [ -n "${{ vars.BACK_MERGE_REVIEWER }}" ]; then
            REVIEWER_OPT="--reviewer ${{ vars.BACK_MERGE_REVIEWER }}"
          fi

          gh pr create \
            --repo "${{ github.repository }}" \
            --head "main" \
            --base "dev" \
            --title "chore: sync main -> dev post-release ${{ steps.release_ref.outputs.ref }}" \
            --body "## Automatic post-release back-merge

          This PR was created automatically after release \`${{ steps.release_ref.outputs.ref }}\` was published on \`main\`.

          **Merging this PR is part of the release definition of done.**
          A release is not considered complete until this PR has been merged.

          ---

          | Field | Value |
          |---|---|
          | Release | \`${{ steps.release_ref.outputs.ref }}\` |
          | Tag commit | \`${{ github.sha }}\` |
          | Published by | @${{ github.actor }} |

          > The _Tag commit_ field points to the commit referenced by the release tag,
          > which corresponds to the merge commit of the release PR generated by Release Please.

          ---

          ### If there are conflicts

          The most common files involved are:
          - \`CHANGELOG.md\`: preserve the published entry from \`main\` and keep the order expected by Release Please.
          - Version files (\`package.json\`, etc.): the version published on \`main\` must be carried over to \`dev\`.
          - Lockfiles: regenerate them on top of the reconciled branch if the conflict is complex.
          - Deployment manifests: determine whether they represent production state or upcoming configuration.

          When in doubt, \`main\` is the source of truth for everything that has already been published." \
            $REVIEWER_OPT
